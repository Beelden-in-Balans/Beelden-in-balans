<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beelden Galerij</title>
    <style>
        /* RUSTIG EN ROND ONTWERP */
        :root {
            --bg-color: #f9f6f0; /* Zacht beige */
            --text-color: #5a5a5a; /* Zacht grijs */
            --accent-color: #d1c7bd;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            max-width: 800px;
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--white);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            /* ZET HIER DE FOTO VAN JE MOEDER: */
            background-image: url('moeder.jpg'); 
            background-size: cover;
            background-position: center;
            margin: 0 auto 20px;
        }

        h1 {
            font-weight: 300;
            color: #4a4a4a;
        }

        p.description {
            font-size: 1.1em;
            line-height: 1.6;
        }

        /* GALERIJ */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1000px;
            padding-bottom: 50px;
        }

        .card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
        }

        .card h3 {
            margin: 0 0 10px;
            font-size: 1.2em;
            font-weight: 500;
        }

        .card p {
            margin: 0;
            font-size: 0.9em;
            color: #888;
        }

        /* POP-UP (MODAL) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--bg-color);
            border-radius: 20px;
            padding: 20px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 1.5em;
            cursor: pointer;
            color: var(--text-color);
        }

        .carousel {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 15px;
            object-fit: contain;
        }

        .nav-btn {
            background: rgba(255,255,255,0.7);
            border: none;
            border-radius: 50%;
            width: 40px; height: 40px;
            font-size: 1.2em;
            cursor: pointer;
            position: absolute;
            transition: background 0.3s;
        }

        .nav-btn:hover { background: var(--white); }
        .prev-btn { left: 10px; }
        .next-btn { right: 10px; }

        .modal-desc {
            margin-top: 15px;
            font-size: 1em;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <header>
        <!-- Verander 'moeder.jpg' in de CSS hierboven naar de bestandsnaam van de foto van je moeder -->
        <div class="profile-pic"></div>
        <h1>Beelden van mijn Moeder</h1>
        <p class="description">Welkom op mijn pagina. Hier deel ik mijn passie voor het maken van beelden. Klik op een beeld om meer foto's en details te zien.</p>
    </header>

    <div class="gallery" id="gallery">
        <!-- Beelden worden hier automatisch geladen via het script -->
    </div>

    <!-- Pop-up venster -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modal-title">Titel</h2>
            <div class="carousel">
                <button class="nav-btn prev-btn" onclick="changeImage(-1)">&#10094;</button>
                <img id="modal-img" src="" alt="Beeld foto">
                <button class="nav-btn next-btn" onclick="changeImage(1)">&#10095;</button>
            </div>
            <p class="modal-desc" id="modal-desc">Beschrijving...</p>
        </div>
    </div>

    <script>
        // ==========================================
        // DE DATABASE: HIER KAN JE MOEDER BEELDEN TOEVOEGEN
        // Voeg simpelweg een nieuw blokje toe tussen { en }
        // ==========================================
        const beeldenData = [
            {
                titel: "Liefde in Steen",
                korte_beschrijving: "Een abstract beeld gemaakt van speksteen.",
                beschrijving: "Dit beeld is gemaakt in 2025. Het representeert de zachte vormen van de natuur. De steen was erg hard maar gaf een prachtige glans na het polijsten.",
                fotos: ["foto1a.jpg", "foto1b.jpg", "foto1c.jpg"] // Zet hier de namen van de foto's
            },
            {
                titel: "Vogel in Vlucht",
                korte_beschrijving: "Bronzen sculptuur op houten sokkel.",
                beschrijving: "Een dynamisch beeld dat het moment van opstijgen vastlegt.",
                fotos: ["foto2a.jpg", "foto2b.jpg"]
            }
            // Kopieer het blokje hierboven om een nieuw beeld toe te voegen
        ];
        // ==========================================

        const gallery = document.getElementById('gallery');
        let currentItem = null;
        let currentPhotoIndex = 0;

        // Bouw de galerij op de homepagina
        beeldenData.forEach((beeld, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            // Laat de eerste foto uit de lijst zien op de homepagina
            card.innerHTML = `
                <img src="${beeld.fotos[0]}" alt="${beeld.titel}" onerror="this.src='https://via.placeholder.com/400x300?text=Geen+Foto'">
                <div class="card-content">
                    <h3>${beeld.titel}</h3>
                    <p>${beeld.korte_beschrijving}</p>
                </div>
            `;
            card.onclick = () => openModal(index);
            gallery.appendChild(card);
        });

        function openModal(index) {
            currentItem = beeldenData[index];
            currentPhotoIndex = 0;
            document.getElementById('modal-title').innerText = currentItem.titel;
            document.getElementById('modal-desc').innerText = currentItem.beschrijving;
            updateModalImage();
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function changeImage(direction) {
            currentPhotoIndex += direction;
            if (currentPhotoIndex < 0) currentPhotoIndex = currentItem.fotos.length - 1;
            if (currentPhotoIndex >= currentItem.fotos.length) currentPhotoIndex = 0;
            updateModalImage();
        }

        function updateModalImage() {
            const imgEl = document.getElementById('modal-img');
            imgEl.src = currentItem.fotos[currentPhotoIndex];
            // Fallback als foto nog niet is geüpload
            imgEl.onerror = () => imgEl.src = 'https://via.placeholder.com/600x400?text=Foto+niet+gevonden';
        }

        // Sluit pop-up als je ernaast klikt
        window.onclick = function(event) {
            if (event.target == document.getElementById('modal')) {
                closeModal();
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beelden Galerij</title>
    <style>
        /* RUSTIG EN ROND ONTWERP */
        :root {
            --bg-color: #f9f6f0;
            --text-color: #5a5a5a;
            --accent-color: #d1c7bd;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* NIEUW: De achtergrond banner */
        .banner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 250px;
            background-image: url('achtergrond.jpg'); /* Zorg dat je achtergrond.jpg uploadt */
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        header {
            text-align: center;
            padding: 20px;
            max-width: 800px;
            margin-top: 175px; /* Zorgt dat de profielfoto de banner overlapt */
            position: relative;
            z-index: 1; /* Blijft boven de banner */
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--white);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background-image: url('moeder.jpg'); /* Zorg dat moeder.jpg bestaat */
            background-color: #ccc;
            background-size: cover;
            background-position: center;
            margin: 0 auto 20px;
        }

        h1 {
            font-weight: 300;
            color: #4a4a4a;
        }

        p.description {
            font-size: 1.1em;
            line-height: 1.6;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1000px;
            padding-bottom: 50px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content { padding: 15px; }
        .card h3 { margin: 0 0 10px; font-size: 1.2em; font-weight: 500; }
        .card p { margin: 0; font-size: 0.9em; color: #888; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--bg-color);
            border-radius: 20px;
            padding: 20px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 1.5em;
            cursor: pointer;
            color: var(--text-color);
        }

        .carousel {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 15px;
            object-fit: contain;
        }

        .nav-btn {
            background: rgba(255,255,255,0.7);
            border: none;
            border-radius: 50%;
            width: 40px; height: 40px;
            font-size: 1.2em;
            cursor: pointer;
            position: absolute;
            transition: background 0.3s;
        }

        .nav-btn:hover { background: var(--white); }
        .prev-btn { left: 10px; }
        .next-btn { right: 10px; }
        .modal-desc { margin-top: 15px; font-size: 1em; line-height: 1.5; }
    </style>
</head>
<body>

    <!-- De nieuwe banner -->
    <div class="banner"></div>

    <header>
        <div class="profile-pic"></div>
        <h1>Beelden van mijn Moeder</h1>
        <p class="description">Welkom op mijn pagina. Hier deel ik mijn passie voor het maken van beelden. Klik op een beeld om meer foto's en details te zien.</p>
    </header>

    <div class="gallery" id="gallery"></div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modal-title">Titel</h2>
            <div class="carousel">
                <button class="nav-btn prev-btn" onclick="changeImage(-1)">&#10094;</button>
                <img id="modal-img" src="" alt="Beeld foto">
                <button class="nav-btn next-btn" onclick="changeImage(1)">&#10095;</button>
            </div>
            <p class="modal-desc" id="modal-desc">Beschrijving...</p>
        </div>
    </div>

    <script>
        // DATABASE
        const beeldenData = [
            {
                titel: "Liefde in Steen",
                map: "Beelden/liefde-in-steen/",
                korte_beschrijving: "Een abstract beeld gemaakt van speksteen.",
                beschrijving: "Dit beeld is gemaakt in 2025. Het representeert de zachte vormen van de natuur.",
                fotos: ["Foto1.jpg", "Foto2.jpg"] 
            },
            {
                titel: "Vogel in Vlucht",
                map: "Beelden/vogel-in-vlucht/",
                korte_beschrijving: "Bronzen sculptuur op houten sokkel.",
                beschrijving: "Een dynamisch beeld dat het moment van opstijgen vastlegt.",
                fotos: ["Vogel1.jpg"]
            }
        ];

        const gallery = document.getElementById('gallery');
        let currentItem = null;
        let currentPhotoIndex = 0;

        beeldenData.forEach((beeld, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            // OPGEZLOST: this.onerror=null toegevoegd om oneindig herladen te voorkomen
            card.innerHTML = `
                <img src="${beeld.map}${beeld.fotos[0]}" alt="${beeld.titel}" onerror="this.onerror=null; this.src='https://via.placeholder.com/400x300?text=Geen+Foto'">
                <div class="card-content">
                    <h3>${beeld.titel}</h3>
                    <p>${beeld.korte_beschrijving}</p>
                </div>
            `;
            card.onclick = () => openModal(index);
            gallery.appendChild(card);
        });

        function openModal(index) {
            currentItem = beeldenData[index];
            currentPhotoIndex = 0;
            document.getElementById('modal-title').innerText = currentItem.titel;
            document.getElementById('modal-desc').innerText = currentItem.beschrijving;
            updateModalImage();
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function changeImage(direction) {
            currentPhotoIndex += direction;
            if (currentPhotoIndex < 0) currentPhotoIndex = currentItem.fotos.length - 1;
            if (currentPhotoIndex >= currentItem.fotos.length) currentPhotoIndex = 0;
            updateModalImage();
        }

        function updateModalImage() {
            const imgEl = document.getElementById('modal-img');
            imgEl.src = currentItem.map + currentItem.fotos[currentPhotoIndex];
            // OPGEZLOST: Ook hier de veilige onerror toegepast
            imgEl.onerror = function() {
                this.onerror=null; 
                this.src='https://via.placeholder.com/600x400?text=Foto+niet+gevonden';
            };
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('modal')) {
                closeModal();
            }
        }
    </script>
</body>
</html>
